{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | 25 First</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background-color: #ffffff; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: serif;
        }
        .login-card { 
            border: 1px solid #000; 
            border-radius: 0; 
            box-shadow: none; 
            width: 100%; 
            max-width: 400px; 
        }
        .card-header { 
            background-color: #fff; 
            color: #000; 
            padding: 2.5rem 1rem; 
            text-align: center; 
            border-bottom: 1px solid #000;
        }
        .form-control {
            border: 1px solid #000;
            border-radius: 0;
            padding: 15px;
        }
        .otp-input { 
            letter-spacing: 0.8rem; 
            text-align: center; 
            font-size: 1.8rem; 
            font-weight: bold; 
            border: 1px solid #000;
            border-radius: 0;
        }
        .otp-input:focus {
            box-shadow: none;
            border-color: #000;
            background-color: #fafafa;
        }
        .btn-dark {
            background-color: #fff;
            color: #000;
            border: 1px solid #000;
            border-radius: 0;
            padding: 12px;
            transition: all 0.2s ease;
        }
        .btn-dark:hover {
            background-color: #000;
            color: #fff;
        }
        .alert {
            border-radius: 0;
            border: 1px solid #000;
            font-size: 0.8rem;
        }
        .alert-warning, .alert-danger, .alert-error {
            background-color: #ff0000;
            color: #fff;
            border-color: #000;
        }
        .text-warning {
            color: #ff0000 !important;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="card-header">
            <img src="{% static 'img_asset/logo.webp' %}" alt="Shirt Store Logo" class="img-fluid" style="max-width: 150px; border: 1px solid #000;">
            <div class="mt-3 small fw-bold text-uppercase" style="letter-spacing: 2px;">Verification</div>
        </div>
        <div class="card-body p-4 text-center">
            <p class="text-muted small mb-4 text-uppercase" style="letter-spacing: 1px;">
                Enter the 6-digit code sent to your email. <br>
                <span class="text-warning mt-2 d-block"><i class="bi bi-exclamation-triangle"></i> Verification will terminate other sessions.</span>
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} small text-uppercase">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="text" name="otp" class="form-control otp-input" maxlength="6" placeholder="000000" autofocus required>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold mb-3 text-uppercase" style="letter-spacing: 2px;">VERIFY CODE</button>
            </form>
            
            <a href="{% url 'hidden' %}" class="text-decoration-none small text-dark fw-bold text-uppercase" style="letter-spacing: 1px; font-size: 0.7rem;">
                <i class="bi bi-arrow-clockwise"></i> Resend Code
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
