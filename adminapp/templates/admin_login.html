{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | 25 First</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: serif;
        }
        .login-card {
            border: 1px solid #000;
            border-radius: 0;
            box-shadow: none;
            width: 100%;
            max-width: 400px;
        }
        .card-header {
            background-color: #fff;
            color: #000;
            text-align: center;
            padding: 2.5rem 1rem;
            border-bottom: 1px solid #000;
            border-radius: 0;
        }
        .form-control {
            border: 1px solid #000;
            border-radius: 0;
            padding: 12px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .form-control:focus {
            border-color: #000;
            box-shadow: none;
            background-color: #fafafa;
        }
        .input-group-text {
            background-color: #fff;
            border: 1px solid #000;
            border-radius: 0;
        }
        .btn-dark {
            background-color: #fff;
            color: #000;
            border: 1px solid #000;
            border-radius: 0;
            padding: 12px;
            transition: all 0.2s ease;
        }
        .btn-dark:hover {
            background-color: #000;
            color: #fff;
        }
        .alert {
            border-radius: 0;
            border: 1px solid #000;
            font-size: 0.85rem;
            font-weight: bold;
        }
        .alert-warning, .alert-danger, .alert-error {
            background-color: #ff0000;
            color: #fff;
            border-color: #000;
        }
        .form-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #000 !important;
        }
    </style>
</head>
<body>
    <div class="login-card card">
        <div class="card-header">
            <img src="{% static 'img_asset/logo.webp' %}" alt="Shirt Store Logo" class="img-fluid" style="max-width: 150px; border: 1px solid #000;">
            <div class="mt-3 small fw-bold text-uppercase" style="letter-spacing: 3px;">Master Panel</div>
        </div>
        <div class="card-body p-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message|upper }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="IDENTIFICATION" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="CREDENTIALS" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold text-uppercase" style="letter-spacing: 2px;">
                    SECURE LOGIN
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
